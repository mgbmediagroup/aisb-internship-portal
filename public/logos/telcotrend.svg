<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <circle cx="40" cy="40" r="40" fill="#27ae60"/>
  <!-- Terminal/Code icon -->
  <rect x="16" y="22" width="48" height="36" rx="4" fill="white"/>
  <!-- Terminal header bar -->
  <rect x="16" y="22" width="48" height="8" rx="4" fill="white"/>
  <rect x="16" y="26" width="48" height="4" fill="white"/>
  <line x1="16" y1="30" x2="64" y2="30" stroke="#27ae60" stroke-width="0.5" opacity="0.3"/>
  <!-- Terminal dots -->
  <circle cx="22" cy="26" r="1.5" fill="#e74c3c"/>
  <circle cx="27" cy="26" r="1.5" fill="#f39c12"/>
  <circle cx="32" cy="26" r="1.5" fill="#27ae60"/>
  <!-- Code bracket > -->
  <polyline points="22,38 30,42 22,46" fill="none" stroke="#27ae60" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor line -->
  <line x1="34" y1="46" x2="48" y2="46" stroke="#27ae60" stroke-width="2.5" stroke-linecap="round"/>
</svg>